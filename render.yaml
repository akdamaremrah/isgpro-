services:
  # ──────────────────────────────────────────────────────────────
  # 1. BACKEND — Flask Web Service (Python)
  # ──────────────────────────────────────────────────────────────
  - type: web
    name: isg-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        # Neon.tech'ten alınan PostgreSQL URL'si (manuel eklenecek)
        # Örn: postgresql://user:pass@ep-xxx.neon.tech/neondb?sslmode=require
        sync: false
      - key: BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemini-2.5-flash

  # ──────────────────────────────────────────────────────────────
  # 2. FRONTEND — Static Site (React + Vite)
  # ──────────────────────────────────────────────────────────────
  - type: static
    name: isg-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # Backend URL'si — deploy sonrası Render'ın verdiği URL
        # Örn: https://isg-backend.onrender.com
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
