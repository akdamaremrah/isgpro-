services:
  # ──────────────────────────────────────────────────────────────
  # 1. BACKEND — Flask Web Service (Python)
  # ──────────────────────────────────────────────────────────────
  - type: web
    name: isg-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: isg-db
          property: connectionString
      - key: BASE_URL
        # Render backend URL'si — deploy ettikten sonra otomatik set edilir
        sync: false
      - key: FRONTEND_URL
        # Render static site URL'si — deploy ettikten sonra set edilir
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemini-2.5-flash

  # ──────────────────────────────────────────────────────────────
  # 2. FRONTEND — Static Site (React + Vite)
  # ──────────────────────────────────────────────────────────────
  - type: web
    name: isg-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: VITE_API_URL
        # Backend URL'si — deploy ettikten sonra set edilir
        # Örn: https://isg-backend.onrender.com
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ──────────────────────────────────────────────────────────────
# 3. DATABASE — PostgreSQL
# ──────────────────────────────────────────────────────────────
databases:
  - name: isg-db
    plan: free
    databaseName: isg_production
    user: isg_user
